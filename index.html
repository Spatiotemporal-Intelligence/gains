<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/style.css">
    <title>股票涨幅可视化报告</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="268f3956-b805-41b2-ba45-20312f3a85d9"></script>
    <!-- Add Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Add Flatpickr -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/zh.js"></script>
</head>
<body>
    <div class="container">
        <h1>股票多周期涨幅排行动态可视化</h1>
        
        <div class="controls">
            <!-- Date Query Controls -->
            <div class="date-picker-group">
                <label>开始日期:</label>
                <!-- Use type="text" for flatpickr -->
                <input type="text" id="start-date" placeholder="选择日期">
            </div>

            <div style="width: 1px; height: 30px; background: #eee; margin: 0 5px;"></div>

            <button onclick="toggleMainBoard()" id="btn-main-board">只看主板</button>

            <!-- Playback Controls -->
            <button onclick="step(-1)">⏮</button>
            <button onclick="toggleAnimation()" id="btn-play">播放</button>
            <button onclick="step(1)">⏭</button>
            
            <div class="timeline-container">
                <input type="range" id="timeline" min="0" max="100" value="0" step="1" oninput="seek(this.value)">
            </div>
            
            <span id="current-date" style="font-weight: bold; font-size: 16px; min-width: 110px; display: inline-block; text-align: center;"></span>
            
            <!-- Removed separate refresh button as it's now part of query -->
        </div>

        <div id="loading" class="loading">正在加载最新数据...</div>
        <div id="tooltip" class="tooltip"></div>
        
        <!-- Special Row for Current Day Treemap -->
        <div id="g0-container" class="chart-container" style="width: 100%; height: 800px; margin-bottom: 20px; box-sizing: border-box;">
            <div class="chart-title">
                <span>G0 (当日涨幅 - 板块热力图)</span>
            </div>
            <div id="chart-G0" class="chart-svg-container" style="height: 100%;"></div>
        </div>

        <!-- Multiple Charts Grid -->
        <div id="charts-container" class="charts-grid">
            <!-- Charts will be dynamically injected via JS -->
        </div>

        <!-- News Feed Section -->
        <div class="news-container" style="margin: 0 auto 20px auto; background: white; padding: 0; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.03); max-width: 920px;">
            <div class="chart-title" style="padding: 15px; border-bottom: 1px solid #eee;">
                <span>财联社电报</span>
                <span id="news-status" style="float: right; font-size: 12px; color: #999; font-weight: normal;"></span>
            </div>
            <div id="telegraph-list" style="overflow-y: auto; height: 600px; padding: 0;">
                <!-- News items will be injected here -->
                <div style="padding: 20px; text-align: center; color: #999;">正在加载电报...</div>
            </div>
        </div>

        <div class="data-info" id="update-time"></div>
        
        <!-- Expanded Modal -->
        <div id="expanded-modal" class="modal-overlay">
            <div id="modal-content" class="modal-content">
                <button class="modal-close" onclick="closeModal()">×</button>
                <div id="modal-chart-title" style="font-size: 24px; font-weight: 700; margin-bottom: 20px; color: #333;"></div>
                <div id="modal-chart-container" style="flex-grow: 1; width: 100%; height: 0; min-height: 0; position: relative;"></div>
            </div>
        </div>

    </div>
    <script src="js/script.js"></script>
</body>
</html>
